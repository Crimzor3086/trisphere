services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      REGISTRY_DB_PATH: /app/data/registry.db
    volumes:
      - ./data:/app/data
      - ./deployments:/app/deployments
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
